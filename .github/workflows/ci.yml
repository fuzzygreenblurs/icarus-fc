name: 1d-stabilizer CI 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  one-d-host-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 1d_stabilizer
    steps:
      - uses: actions/checkout@v5

      - name: build 1d-stabilizer
        run: ./scripts/build.sh 

      - name: install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: check misra compliance 
        run: ./scripts/misra.sh 
