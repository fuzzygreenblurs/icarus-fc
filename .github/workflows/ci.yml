name: 1d-stabilizer CI 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  1d-host-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 1d-stabilizer-build
        working-directory: 1d_stabilizer 
        run: cmake -S . -B build/host && cmake --build build/host
